worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    server {
        listen 80;
        server_name _;

        # Static file serving (React/Vite SPA)
        root /usr/share/nginx/html;
        index index.html;

        # Any route that doesn't match a file goes to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy /api requests to the backend
        location /api/ {
            # Strip the /api prefix before sending to backend
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend:4000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy /storage/ requests to MinIO
        location /storage/ {
            rewrite ^/storage/(.*)$ /$1 break;
            proxy_pass http://minio:9000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy Socket.io requests to the backend
        location /socket.io/ {
            proxy_pass http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
