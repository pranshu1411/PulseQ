services:
  nginx:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: job_queue_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: always


  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: job_queue_backend
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: job_queue_worker
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: job_queue_postgres
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseq_admin -d pulseq_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: job_queue_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio
    container_name: job_queue_minio
    env_file: .env.production
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  createbuckets:
    image: minio/mc
    container_name: job_queue_createbuckets
    env_file: .env.production
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb myminio/pulseq || true;
      /usr/bin/mc anonymous set public myminio/pulseq;
      exit 0;
      "

  prometheus:
    image: prom/prometheus:latest
    container_name: job_queue_prometheus
    volumes:
      - ./prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: job_queue_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: always

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
